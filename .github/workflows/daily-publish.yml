# 매일 예약 발행 + 카페24 FTP 자동 업로드
# - Playwright로 퍼즐 이미지·글 생성 후 FTP로 카페24에 업로드
# - push to main 시에도 배포 → 로컬–서버 동기화 유지
name: Daily publish and FTP deploy

on:
  push:
    branches: [main]
  schedule:
    # 매일 00:00 UTC = 한국시간 09:00 (필요 시 수정)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_date:
        description: '테스트용 발행일 (YYYY-MM-DD). 비우면 오늘 날짜. SEO 위해 테스트 시 과거 날짜 권장'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # manifest·posts 커밋 후 푸시용
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and Chromium
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run publish script
        run: |
          if [ -n "${{ inputs.test_date }}" ]; then
            echo "🧪 테스트 모드: 발행일 ${{ inputs.test_date }}"
            python3 auto_publish_with_images.py --date=${{ inputs.test_date }}
          else
            # 매일: 놓친 날짜까지 모두 발행(catchup) → 실행이 빠진 날도 다음 실행 시 채워짐
            echo "📅 catchup 모드: 오늘까지 미발행 날짜 모두 발행"
            python3 auto_publish_with_images.py catchup
          fi

      - name: List generated files (이미지/글 생성 확인)
        run: |
          echo "=== posts/ ==="
          ls -la posts/ 2>/dev/null || true
          echo "=== images/puzzles/ ==="
          ls -la images/puzzles/ 2>/dev/null || true

      - name: Commit and push manifest + posts (다음 실행 시 전체 목록 유지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published_manifest.json posts/ posts.xml images/puzzles/ 2>/dev/null || true
          git status
          if git diff --staged --quiet; then
            echo "변경 없음, 푸시 생략"
          else
            git commit -m "chore: 자동 발행 manifest·posts 반영"
            git push
          fi

      - name: Prepare upload folder (no .git)
        run: |
          mkdir -p upload
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='upload' \
            --exclude='**/__pycache__' \
            --exclude='logs' \
            --exclude='*.py' \
            ./ upload/

      - name: FTP Deploy to Cafe24 (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cd upload
          lftp -c "
            set ftp:ssl-allow no
            set ssl:verify-certificate no
            set ftp:passive on
            set net:timeout 60
            set net:max-retries 5
            set net:reconnect-interval-base 5
            set net:reconnect-interval-multiplier 1
            open -u $FTP_USER,$FTP_PASS $FTP_SERVER
            lcd .
            mirror --reverse --verbose .
            bye
          "
